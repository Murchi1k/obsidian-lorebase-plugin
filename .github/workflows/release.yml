name: Release

on:
  release:
    types: [published]

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest release assets
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" main.js styles.css manifest.json --clobber
